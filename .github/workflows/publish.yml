# Publish @blockchain0x/x402 to npm with full Sigstore provenance
# attestation. Manual dispatch only.
#
# Requires npm Trusted Publisher binding on
# https://www.npmjs.com/package/@blockchain0x/x402/access:
#   Publisher type:    GitHub Actions
#   Repository owner:  tosh-labs
#   Repository name:   blockchain0x-x402
#   Workflow filename: publish.yml
#   Environment:       (blank)
#
# This file is mirrored from the private monorepo
# `tosh-labs/blockchain0x-app:packages/x402/.public-templates/.github/workflows/publish.yml`
# by the `mirror-x402` workflow there. Do not edit it directly in the
# public repo - changes will be overwritten on the next mirror.

name: publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'npm dist-tag'
        required: true
        default: 'alpha'
        type: choice
        options:
          - alpha
          - beta
          - latest

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # Do NOT set registry-url - it writes ~/.npmrc with an empty
          # authToken that shortcuts OIDC. Default registry is npmjs.org
          # so this is a no-op for routing.

      - name: upgrade npm CLI for OIDC support (needs >=11.5.1)
        run: npm install -g npm@latest

      - name: install deps
        # The mirrored package.json carries `@blockchain0x/node` as a
        # regular devDependency (the workspace:* form is rewritten to
        # the pinned alpha version by the mirror workflow). A plain
        # `npm install` pulls it from npmjs.org.
        run: npm install --no-package-lock

      - name: build
        run: npm run build

      - name: test (wire-format unit tests must pass before publish)
        # Last-chance defense before the package goes to npm. The
        # source has already passed monorepo-side tests via the mirror
        # workflow; this second gate catches any drift introduced
        # during the snapshot transformation (tsconfig inlining,
        # package.json mutations, etc.).
        run: npm test

      - name: publish (token auth + provenance + selected tag)
        # Auth via the granular automation token (NPM_TOKEN secret) rather than
        # OIDC trusted-publisher auto-exchange: the trusted publisher IS
        # configured on npmjs.org, but npm's automatic OIDC exchange stopped
        # authenticating (`npm publish` returns ENEEDAUTH) despite an identical
        # workflow publishing fine earlier - an external npm-side change.
        # `--provenance` is unchanged: the Sigstore attestation comes from
        # `id-token: write` and is independent of the publish auth method.
        env:
          DIST_TAG: ${{ inputs.tag }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN}" ]; then
            echo "::error::NPM_TOKEN secret is not set in this repo; cannot publish."
            exit 1
          fi
          printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_TOKEN}" > "$HOME/.npmrc"
          npm --version
          npm publish --provenance --access public --tag "$DIST_TAG"

      - name: advance `latest` dist-tag to the just-published version
        # The `latest` dist-tag is what `npm install <pkg>` resolves to
        # when the caller does not pin a tag. By default `npm publish
        # --tag <X>` only sets dist-tag X, leaving `latest` frozen at
        # whatever it was. While we're in the pre-1.0 alpha era we want
        # `latest` to always move forward to the newest release so a
        # bare `npm install` does not silently install a stale build.
        #
        # Auth note: Trusted Publisher OIDC is scoped to `npm publish`
        # only - the token is request-scoped and does not authenticate
        # subsequent `npm dist-tag` calls. We use a long-lived granular
        # automation token from the `NPM_TOKEN` secret here. If the
        # secret is not configured the step warns and exits cleanly so
        # the workflow as a whole stays green; the operator can then
        # advance `latest` manually with `npm dist-tag add`.
        #
        # Skipped when the publish above already set `latest` (i.e.
        # the dispatch input was `tag: latest`).
        #
        # Policy revisit at 1.0: once a stable line exists, `latest`
        # should pin to the newest stable, not alphas. Remove this step
        # then (or gate it on `inputs.tag == 'latest'` only).
        if: inputs.tag != 'latest'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "::warning::NPM_TOKEN secret is not configured; skipping latest dist-tag advance."
            echo "::warning::To enable automatic advance: mint a granular automation token at"
            echo "::warning::https://www.npmjs.com/settings/<user>/tokens with read+write on the @blockchain0x scope,"
            echo "::warning::then add it as the NPM_TOKEN repo secret."
            exit 0
          fi
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "Advancing ${PKG_NAME} latest -> ${PKG_VER}"
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          npm dist-tag add "${PKG_NAME}@${PKG_VER}" latest
          npm view "${PKG_NAME}" dist-tags
          rm -f "$HOME/.npmrc"
